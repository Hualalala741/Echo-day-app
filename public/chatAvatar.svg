<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- 左耳 -->
  <rect x="18" y="105" rx="6" ry="6" width="18" height="36" fill="#1e2a3a" stroke="#2e3f54" stroke-width="1.5"/>
  <!-- 右耳 -->
  <rect x="220" y="105" rx="6" ry="6" width="18" height="36" fill="#1e2a3a" stroke="#2e3f54" stroke-width="1.5"/>
  <!-- 外轮廓 -->
  <rect x="36" y="44" rx="56" ry="56" width="184" height="164" fill="#1e2a3a" stroke="#2e3f54" stroke-width="2"/>
  <!-- 头顶天线 -->
  <line x1="128" y1="44" x2="128" y2="28" stroke="#1e2a3a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="128" cy="24" r="5" fill="#1e2a3a" stroke="#2e3f54" stroke-width="1.5"/>
  <!-- 头顶中线装饰 -->
  <line x1="128" y1="50" x2="128" y2="72" stroke="#f4efe6" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- 脸 -->
  <rect x="52" y="74" rx="32" ry="32" width="152" height="100" fill="#f4efe6"/>
  <!-- 左眼 -->
  <circle cx="88" cy="115" r="26" fill="#1e2a3a"/>
  <circle cx="79" cy="106" r="7.5" fill="#ffffff"/>
  <circle cx="92" cy="119" r="3.5" fill="#ffffff"/>
  <!-- 右眼 -->
  <circle cx="168" cy="115" r="26" fill="#1e2a3a"/>
  <circle cx="159" cy="106" r="7.5" fill="#ffffff"/>
  <circle cx="172" cy="119" r="3.5" fill="#ffffff"/>
  <!-- 嘴 -->
  <path d="M120 145 Q128 153 136 145" stroke="#1e2a3a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- 左腮红：橘色点 + 黑色短横 -->
  <circle cx="74" cy="150" r="4" fill="#e58e7c"/>
  <rect x="81" y="146" rx="4" ry="4" width="12" height="8" fill="#1e2a3a"/>
  <!-- 右腮红：黑色短横 + 橘色点 -->
  <rect x="163" y="146" rx="4" ry="4" width="12" height="8" fill="#1e2a3a"/>
  <circle cx="182" cy="150" r="4" fill="#e58e7c"/>
  <!-- 底部小横线装饰 -->
  <line x1="118" y1="192" x2="138" y2="192" stroke="#f4efe6" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
</svg>